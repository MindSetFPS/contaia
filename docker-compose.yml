services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: contaia
      POSTGRES_USER: contaia
      POSTGRES_PASSWORD: ${DB_PASSWORD:-contaia}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U contaia"]
      interval: 5s
      timeout: 5s
      retries: 5

  contaia:
    build: .
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql://contaia:${DB_PASSWORD:-contaia}@db:5432/contaia
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}

volumes:
  pgdata:
